<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="./script.js" defer></script>
    <title>Etch-a-Sketch</title>
</head>
<body>
    <h1>Etch-a-Sketch</h1>
    <div class="container">
    </div>
    <div class="options">
        <button class="rainbow">Rainbow</button>
        <button class="black">Black</button>
        <button class="gradual">Gradual Black</button>
    <div class="slider">
        <input type="range" min="4" max="64" value="16" oninput="rangeValue.innerText = this.value">
        <p id="rangeValue">16</p>
    </div>
</div>
</body>
</html>
